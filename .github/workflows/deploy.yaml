name: Deploy accommodica frontend to production

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Deploy to VPS
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_KEY }}
                  passphrase: ${{ secrets.SERVER_PASSPHRASE }}
                  script: |
                      set -e

                      echo "::group::📥 Reset repository"
                      cd /home/admin/accomodica/accommodica
                      git fetch origin
                      git reset --hard origin/main
                      git clean -fd
                      echo "::endgroup::"

                      echo "::group::🐳 Build & start containers"
                      docker compose pull
                      docker compose up -d --build
                      echo "::endgroup::"

                      echo "::group::🔍 Verify containers"
                      docker compose ps
                      if [ "$(docker compose ps --status=exited -q | wc -l)" -gt 0 ]; then exit 1; else echo "All containers running"; fi
                      echo "::endgroup::"

                      echo "::group::✅ Deployment completed"
                      echo "Deployment successful on $(date)"
                      echo "::endgroup::"
